[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "webui/dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/v1/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/v1beta/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/anthropic/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/api/health"
  status = 200

[[redirects]]
  from = "/metrics"
  to = "/.netlify/functions/api/metrics"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
